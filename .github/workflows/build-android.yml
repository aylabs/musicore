name: Build Android AAB

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version override (e.g. 0.1.70) — leave blank to read from frontend/package.json'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build-android:
    name: Build signed release AAB
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Determine version ────────────────────────────────────────────────────
      - name: Compute versionName and versionCode
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION="${{ github.event.inputs.version_override }}"
          else
            VERSION=$(node -p "require('./frontend/package.json').version")
          fi

          echo "versionName=${VERSION}" >> "$GITHUB_OUTPUT"

          # Parse semver components; default minor/patch to 0 if absent
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          # versionCode = major×10000 + minor×100 + patch
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "versionCode=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

          echo "versionName=${VERSION}, versionCode=${VERSION_CODE}"

      # ── Java & Android SDK ───────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Google Services (Firebase) ───────────────────────────────────────────
      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json

      # ── Signing keystore ─────────────────────────────────────────────────────
      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/graditone-release.keystore

      # ── Inject signing config into gradle.properties ─────────────────────────
      - name: Write signing properties
        run: |
          cat >> android/gradle.properties << EOF
          RELEASE_STORE_FILE=graditone-release.keystore
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}
          EOF

      # ── Inject versionCode / versionName ────────────────────────────────────
      - name: Set version in gradle.properties
        run: |
          cat >> android/gradle.properties << EOF
          APP_VERSION_CODE=${{ steps.version.outputs.versionCode }}
          APP_VERSION_NAME=${{ steps.version.outputs.versionName }}
          EOF

      # ── Build signed release AAB ─────────────────────────────────────────────
      - name: Build release AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: graditone-${{ steps.version.outputs.versionName }}-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Print build summary
        run: |
          echo "### Android Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| versionName | ${{ steps.version.outputs.versionName }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| versionCode | ${{ steps.version.outputs.versionCode }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact | graditone-${{ steps.version.outputs.versionName }}-release |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the AAB from the **Artifacts** section above and upload it to Play Console." >> "$GITHUB_STEP_SUMMARY"
